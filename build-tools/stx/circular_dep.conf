# circular dependency config file
# Used to break circular dependency
# Each circular dependency DSC set containss two lines, the first line starts with
# "SRC SET:" shows all related source packages; the second line starts with
# "BUILD ORDER:" shows the build order of these packages. The name of those
# soure packages are seperated with a space. For example:
# SRC SET: a b c d
# BUILD ORDER: a d c b a d c b
# SRC SET: a b c
# BUILD ORDER: a c b a c b
# SRC SET：a b
# BUILD ORDER: a b

# -b> Build depend on
# -r> Runtime depend on
# (s) Source package

SRC SET: linux
BUILD ORDER: linux

SRC SET: linux-rt
BUILD ORDER: linux-rt

SRC SET: openssl
BUILD ORDER: openssl

SRC SET: lvm2
BUILD ORDER: lvm2

SRC SET: tzdata
BUILD ORDER: tzdata

SRC SET: linux lsb lvm2 net-tools openldap openssl python3.9 systemd
BUILD ORDER: linux        systemd lvm2 lsb openssl openldap net-tools                        python3.9

SRC SET: linux lsb lvm2 net-tools openldap openssl python3.9 systemd tzdata
BUILD ORDER: linux        systemd lvm2 lsb openssl openldap net-tools tzdata                 python3.9

SRC SET: ca-certificates libbpf linux lsb lvm2 net-tools openldap openssl python3.9 systemd
BUILD ORDER: linux libbpf systemd lvm2 lsb openssl openldap net-tools        ca-certificates python3.9

SRC SET: linux lsb lvm2 net-tools openldap python3.9 systemd tzdata
BUILD ORDER: linux        systemd lvm2 lsb         openldap net-tools tzdata                 python3.9

SRC SET: linux lsb lvm2 openldap systemd tzdata
